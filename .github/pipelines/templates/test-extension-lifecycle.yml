# Template: test-extension-lifecycle.yml
#
# Runs the full extension lifecycle (query → package → publish → validate →
# share → install → wait → unshare → unpublish) against a small sample
# extension using the specified auth type.

parameters:
  - name: connectionType
    type: string
  - name: azureRmConnection
    type: string
  - name: marketplaceServiceConnectionName
    type: string
  - name: publisherId
    type: string
  - name: extensionId
    type: string
  - name: initialVersion
    type: string
  - name: organizationUrl
    type: string

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: Setup Node.js
    inputs:
      versionSpec: 20.x

  # For PAT matrix entries, acquire a short-lived marketplace token at runtime
  # from the OIDC-backed Azure RM connection so no PAT secret is stored.
  # Resolve the marketplace service connection ID by name via az rest (or use
  # the value directly when it is already a GUID) and then overwrite its
  # password auth parameter with the job-scoped token.
  - task: AzureCLI@2
    displayName: Get Azure DevOps bearer token
    condition: and(succeeded(), eq('${{ parameters.connectionType }}', 'PAT'))
    env:
      MARKETPLACESERVICECONNECTIONNAME: ${{ parameters.marketplaceServiceConnectionName }}
    inputs:
      azureSubscription: ${{ parameters.azureRmConnection }}
      allowNoSubscriptions: true
      scriptType: pscore
      useGlobalConfig: true
      scriptLocation: inlineScript
      inlineScript: |
        $organizationUrl = $env:SYSTEM_COLLECTIONURI.TrimEnd('/')
        $projectName = $env:SYSTEM_TEAMPROJECT
        $connectionName = $env:MARKETPLACESERVICECONNECTIONNAME
        $endpointType = 'CloudMarketplaceEndpoint'

        if (-not $connectionName) {
          throw 'MARKETPLACESERVICECONNECTIONNAME is required'
        }

        $parsedGuid = [guid]::Empty
        if ([guid]::TryParse($connectionName, [ref]$parsedGuid)) {
          $marketplaceServiceConnectionId = $parsedGuid.ToString()
        }
        else {
          $escapedProject = [uri]::EscapeDataString($projectName)
          $escapedName = [uri]::EscapeDataString($connectionName)
          $escapedType = [uri]::EscapeDataString($endpointType)
          $endpointUrl = "$organizationUrl/$escapedProject/_apis/serviceendpoint/endpoints?endpointNames=$escapedName&type=$escapedType&api-version=7.1"

          $endpointResponse = az rest --method get --uri $endpointUrl --resource 499b84ac-1321-427f-aa17-267ca6975798
          $endpointJson = $endpointResponse | ConvertFrom-Json
          $matchingEndpoints = @(
            $endpointJson.value | Where-Object {
              $_.name -eq $connectionName -and $_.type -eq $endpointType
            }
          )

          if ($matchingEndpoints.Count -ne 1) {
            throw "Expected exactly one service connection named '$connectionName' with type '$endpointType' in project '$projectName', found $($matchingEndpoints.Count)"
          }

          $marketplaceServiceConnectionId = $matchingEndpoints[0].id
        }

        $token = az account get-access-token `
          --resource 499b84ac-1321-427f-aa17-267ca6975798 `
          --query accessToken --output tsv
        if (-not $token) {
          throw 'Failed to acquire Azure DevOps bearer token'
        }

        Write-Host "##vso[task.setvariable variable=marketplaceServiceConnectionId]$marketplaceServiceConnectionId"
        Write-Host "Resolved marketplace service connection id: $marketplaceServiceConnectionId"
        Write-Host "##vso[task.setsecret]$token"
        Write-Host "##vso[task.setendpoint id=$marketplaceServiceConnectionId;field=authParameter;key=password]$token"

  - task: azdo-marketplace@6
    name: queryVersion
    displayName: Query next patch version
    continueOnError: true
    inputs:
      operation: queryVersion
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      publisherId: ${{ parameters.publisherId }}
      extensionId: ${{ parameters.extensionId }}
      marketplaceVersionAction: Patch
      workingDirectory: tests/sample-extension
      versionSource: |
        manifest
        marketplace
        ${{ parameters.initialVersion }}

  # --- Package from manifest ---
  - task: azdo-marketplace@6
    name: packageManifest
    displayName: Package from manifest
    inputs:
      operation: package
      publisherId: ${{ parameters.publisherId }}
      extensionId: ${{ parameters.extensionId }}
      extensionVersion: $(queryVersion.proposedVersion)
      extensionVisibility: private_preview
      updateTasksVersion: patch
      updateTasksId: true
      outputPath: $(Build.ArtifactStagingDirectory)
      manifestFile: vss-extension.json
      workingDirectory: tests/sample-extension

  # --- Publish from VSIX ---
  - task: azdo-marketplace@6
    displayName: Publish from VSIX
    name: publish
    inputs:
      operation: publish
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      use: vsix
      vsixFile: $(packageManifest.vsixFile)
      noWaitValidation: true

  # --- Wait for validation ---
  - task: azdo-marketplace@6
    displayName: Wait for validation
    inputs:
      operation: waitForValidation
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      vsixFile: $(publish.vsixFile)

  # --- Share ---
  - task: azdo-marketplace@6
    displayName: Share extension
    inputs:
      operation: share
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      vsixFile: $(publish.vsixFile)
      accounts: ${{ parameters.organizationUrl }}

  # --- Install ---
  - task: azdo-marketplace@6
    displayName: Install extension
    inputs:
      operation: install
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      vsixFile: $(publish.vsixFile)
      accounts: ${{ parameters.organizationUrl }}

  # --- Wait for installation ---
  - task: azdo-marketplace@6
    displayName: Wait for installation
    inputs:
      operation: waitForInstallation
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      publisherId: ${{ parameters.publisherId }}
      extensionId: ${{ parameters.extensionId }}
      vsixFile: $(publish.vsixFile)
      accounts: ${{ parameters.organizationUrl }}

  # --- Unshare ---
  - task: azdo-marketplace@6
    displayName: Unshare extension
    inputs:
      operation: unshare
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      vsixFile: $(publish.vsixFile)
      accounts: ${{ parameters.organizationUrl }}

  # --- Unpublish ---
  - task: azdo-marketplace@6
    displayName: Unpublish extension
    inputs:
      operation: unpublish
      connectionType: ${{ parameters.connectionType }}
      connectionNamePAT: ${{ parameters.marketplaceServiceConnectionName }}
      connectionNameAzureRm: ${{ parameters.azureRmConnection }}
      vsixFile: $(publish.vsixFile)
