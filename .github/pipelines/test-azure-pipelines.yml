# Test Azure Pipelines
#
# Triggered by the release workflow to validate the azdo-marketplace task
# against a small sample extension using PAT and OIDC auth types in a matrix
# across Linux and Windows hosted runners.
#
# Required service connections:
#   MarketplacePatConnection          - PAT marketplace service connection name (or resourceId GUID)
#   MarketplaceAzureRmConnection       - Azure RM (OIDC) service connection
#
# Required variables:
#   publisherId  - Marketplace publisher ID (default: jessehouwing-dev)
#   extensionIdPrefix  - Prefix used for matrix extension IDs

name: test-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

parameters:
  - name: publisherId
    type: string
    default: jessehouwing
  - name: extensionIdPrefix
    type: string
    default: test
  - name: initialVersion
    type: string
    default: 1.0.0
  - name: organizationUrl
    type: string
    default: https://dev.azure.com/jessehouwing
  - name: azureRmConnection
    type: string
    default: fdeb6c4d-4557-4355-a9f8-594ac4fb3db1
  - name: marketplaceServiceConnectionName
    type: string
    default: ca702db9-f203-4430-82a7-02109ac28c33

stages:
  - stage: Test
    displayName: Test Azure Pipelines

    jobs:
      - job: Test
        displayName: Test
        pool:
          vmImage: $(vmImage)
        strategy:
          matrix:
            pat_ubuntu:
              vmImage: ubuntu-latest
              authType: pat
              connectionType: PAT
              extensionId: ${{ parameters.extensionIdPrefix }}-pat-ubuntu
            oidc_ubuntu:
              vmImage: ubuntu-latest
              authType: oidc
              connectionType: AzureRM
              extensionId: ${{ parameters.extensionIdPrefix }}-oidc-ubuntu
            pat_windows:
              vmImage: windows-latest
              authType: pat
              connectionType: PAT
              extensionId: ${{ parameters.extensionIdPrefix }}-pat-windows
            oidc_windows:
              vmImage: windows-latest
              authType: oidc
              connectionType: AzureRM
              extensionId: ${{ parameters.extensionIdPrefix }}-oidc-windows
        steps:
          - template: templates/test-extension-lifecycle.yml
            parameters:
              connectionType: $(connectionType)
              azureRmConnection: ${{ parameters.azureRmConnection }}
              marketplaceServiceConnectionName: ${{ parameters.marketplaceServiceConnectionName }}
              publisherId: ${{ parameters.publisherId }}
              extensionId: $(extensionId)
              initialVersion: ${{ parameters.initialVersion }}
              organizationUrl: ${{ parameters.organizationUrl }}
